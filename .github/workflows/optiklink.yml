name: 🎮 OptikLink-Keep

on:
  schedule:
    - cron: '0 1 */2 * *'
  workflow_dispatch:

jobs:
  keepalive:
    name: 🔄 执行保活
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      - name: 🔑 还原登录凭证
        run: |
          cat << 'EOF' > state.json
          ${{ secrets.OPTIKLINK_STATE }}
          EOF


      - name: 🚀 运行保活脚本
        env:
          TG_BOT: ${{ secrets.TG_BOT }}
        run: npx playwright test

      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-results/
          retention-days: 7

