name: 🎮 OptikLink-Keep

on:
  schedule:
    - cron: '0 1 */2 * *'
  workflow_dispatch:
  
permissions:
  actions: write
  contents: read

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb chromium-browser
          pip install seleniumbase requests

      - name: ⚙ 设置代理 (sing-box)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          if [ -n "$NODE_LINK" ]; then
            bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
            echo "IS_PROXY=true" >> $GITHUB_ENV
            echo "PROXY_SERVER=http://127.0.0.1:1081" >> $GITHUB_ENV
          fi

      - name: 🚀 运行保活脚本
        env:
          DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }} # 格式: email,password
          PANEL_ACCOUNT:   ${{ secrets.PANEL_ACCOUNT }}   # 格式: user,pass
          TG_BOT_TOKEN:    ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          IS_PROXY:        ${{ env.IS_PROXY }}
          PROXY_SERVER:    ${{ env.PROXY_SERVER }}
        run: xvfb-run --auto-servernum python3 optiklink_bot.py

      - name: 🧹 清理旧记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          for run_id in $runs; do gh run delete $run_id || true; done
